function buildChecklist() {
const all = {};
SPECIAL_SECTIONS.forEach(sec => {
sec.stickers.forEach(s => { all[s.id] = { …s, section: sec.code, sectionName: sec.name, isSpecial: true }; });
});
TEAMS.forEach(t => {
t.players.forEach((p, i) => {
const id = `${t.code}${i+1}`;
all[id] = { id, name: p, section: t.code, sectionName: t.name, teamCode: t.code, number: i+1, foil: i===0, isSpecial: false };
});
});
return all;
}
const CHECKLIST = buildChecklist();
const ALL_IDS = Object.keys(CHECKLIST);
const TOTAL = ALL_IDS.length;
const ALL_CODES = […SPECIAL_SECTIONS.map(s=>s.code), …TEAMS.map(t=>t.code)];

function parseIds(text) {
const upper = text.toUpperCase().replace(/\s+/g,” “);
const found = [];
const re = new RegExp(`\\b(${ALL_CODES.join("|")})(\\d{1,2})\\b`,“g”);
let m;
while((m = re.exec(upper)) !== null) {
const id = `${m[1]}${m[2]}`;
if(CHECKLIST[id] && !found.includes(id)) found.push(id);
}
if(upper.includes(“00”) && !found.includes(“00”)) found.push(“00”);
return found;
}

function buildExportData(state) {
const doubles = ALL_IDS.filter(id => state.owned[id] > 1);
const missing = ALL_IDS.filter(id => !state.owned[id]);
const groupBySec = (ids) => {
const map = {};
ids.forEach(id => {
const s = CHECKLIST[id].section;
if(!map[s]) map[s] = { name: CHECKLIST[id].sectionName, ids:[] };
map[s].ids.push(id);
});
return Object.values(map);
};
return { doubles, missing, doublesBySec: groupBySec(doubles), missingBySec: groupBySec(missing) };
}

  <h1>⚽ Panini WM 2026</h1>
  <div className="sub">FIFA World Cup 2026 · {TOTAL} Sticker · 48 Teams + Spezialseiten</div>

  {/* KPI MODAL */}
  {kpiModal && (() => {
    const configs = {
      owned: { title:"Habe ich", color:"var(--g)", ids: ALL_IDS.filter(id=>state.owned[id]>=1) },
      doubles: { title:"Doppelte", color:"var(--y)", ids: ALL_IDS.filter(id=>state.owned[id]>1) },
      missing: { title:"Fehlende", color:"var(--r)", ids: ALL_IDS.filter(id=>!state.owned[id]) },
      needed: { title:"Gesuchte", color:"var(--p)", ids: ALL_IDS.filter(id=>state.needed[id]&&!state.owned[id]) },
    };
    const cfg = configs[kpiModal];
    // Group by section
    const grouped = {};
    cfg.ids.forEach(id => {
      const s = CHECKLIST[id].section;
      const sn = CHECKLIST[id].sectionName;
      if (!grouped[s]) grouped[s] = { name: sn, ids: [] };
      grouped[s].ids.push(id);
    });
    const sections = Object.values(grouped);
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:300,display:"flex",flexDirection:"column"}} onClick={()=>setKpiModal(null)}>
        <div style={{flex:1,maxHeight:"10vh"}}/>
        <div style={{background:"var(--s1)",borderRadius:"16px 16px 0 0",maxHeight:"90vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
          <div style={{padding:"14px 16px 10px",borderBottom:"1px solid var(--br)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div>
              <span style={{fontFamily:"'Baloo 2',cursive",fontSize:"1.1rem",color:cfg.color}}>{cfg.title}</span>
              <span style={{fontSize:".78rem",color:"var(--mu)",marginLeft:8}}>{cfg.ids.length} Sticker</span>
            </div>
            <button onClick={()=>setKpiModal(null)} style={{background:"none",border:"1px solid var(--br)",color:"var(--mu)",borderRadius:999,padding:"3px 11px",cursor:"pointer",fontFamily:"Nunito",fontSize:".78rem"}}>✕</button>
          </div>

            {sections.map(sec => (
              <div key={sec.name} style={{marginBottom:12}}>
                <div style={{fontSize:".7rem",color:"var(--mu)",fontWeight:700,marginBottom:5,textTransform:"uppercase",letterSpacing:".04em"}}>{sec.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {sec.ids.map(id => (
                    <span key={id} style={{padding:"2px 9px",borderRadius:999,fontSize:".73rem",fontWeight:700,
                      background: kpiModal==="doubles" ? "rgba(245,158,11,.12)" : kpiModal==="missing" ? "rgba(239,68,68,.1)" : kpiModal==="needed" ? "rgba(168,85,247,.12)" : "rgba(34,197,94,.12)",
                      color: kpiModal==="doubles" ? "var(--y)" : kpiModal==="missing" ? "var(--r)" : kpiModal==="needed" ? "var(--p)" : "var(--g)",
                      border: `1px solid ${kpiModal==="doubles" ? "rgba(245,158,11,.25)" : kpiModal==="missing" ? "rgba(239,68,68,.25)" : kpiModal==="needed" ? "rgba(168,85,247,.25)" : "rgba(34,197,94,.25)"}`
                    }}>
                      {id}{kpiModal==="doubles" ? ` ×${state.owned[id]}` : ""}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  })()}
