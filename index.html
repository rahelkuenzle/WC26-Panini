<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Panini WM26">
<title>Panini WM 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#22c55e;--y:#f59e0b;--r:#ef4444;--b:#3b82f6;--p:#a855f7;--bg:#0f0e17;--s1:#1a1928;--s2:#232238;--br:#2e2d4a;--tx:#f0eeff;--mu:#8885a8}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;max-width:700px;margin:0 auto;padding:12px 10px 80px;min-height:100vh}
h1{font-size:1.8rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#f59e0b,#ef4444,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sub{color:var(--mu);font-size:.78rem;text-align:center;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.sc{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:9px 4px;text-align:center;cursor:pointer}
.sv{font-size:1.4rem;font-weight:800;line-height:1}
.sl{font-size:.6rem;color:var(--mu);text-transform:uppercase;margin-top:2px}
.sc.g .sv{color:var(--g)}.sc.y .sv{color:var(--y)}.sc.r .sv{color:var(--r)}.sc.p .sv{color:var(--p)}
.pb-w{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.pb-l{display:flex;justify-content:space-between;font-size:.74rem;color:var(--mu);margin-bottom:5px}
.pb{height:10px;border-radius:999px;background:var(--br);overflow:hidden}
.pb-f{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#84cc16);transition:width .4s}
.tabs{display:flex;gap:4px;margin-bottom:10px;background:var(--s1);padding:4px;border-radius:12px;border:1px solid var(--br)}
.tab{flex:1;padding:7px 2px;border:none;border-radius:8px;background:transparent;color:var(--mu);font-size:.7rem;font-weight:700;cursor:pointer}
.tab.active{background:var(--s2);color:var(--tx)}
.panel{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:13px;margin-bottom:10px}
.panel h3{font-size:.9rem;font-weight:800;color:var(--y);margin-bottom:9px}
.m4{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:9px}
.mb{padding:7px;border-radius:8px;border:2px solid var(--br);background:transparent;color:var(--mu);font-size:.72rem;font-weight:700;cursor:pointer}
.mb.active-add{border-color:var(--g);color:var(--g);background:rgba(34,197,94,.08)}
.mb.active-remove{border-color:var(--r);color:var(--r);background:rgba(239,68,68,.08)}
.mb.active-need{border-color:var(--b);color:var(--b);background:rgba(59,130,246,.08)}
.mb.active-unneed{border-color:var(--mu);color:var(--mu);background:rgba(136,133,168,.08)}
textarea{width:100%;min-height:64px;background:var(--bg);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-size:.86rem;padding:8px;resize:vertical;outline:none}
textarea:focus{border-color:var(--y)}
textarea::placeholder{color:var(--mu)}
.btn-go{margin-top:7px;width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:.9rem;font-weight:800;cursor:pointer}
.frow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.flt{padding:4px 10px;border-radius:999px;border:1.5px solid var(--br);background:transparent;color:var(--mu);font-size:.7rem;font-weight:700;cursor:pointer}
.flt.active{border-color:var(--y);color:var(--y)}
.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.sec-card{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:9px 10px;cursor:pointer}
.sec-card:hover{border-color:var(--y)}
.sec-card.special{border-color:rgba(168,85,247,.35);background:rgba(168,85,247,.06)}
.sec-card h4{font-size:.82rem;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-bar{height:4px;border-radius:999px;background:var(--br);overflow:hidden;margin-bottom:3px}
.mini-f{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--g),#84cc16)}
.sec-meta{display:flex;justify-content:space-between;font-size:.63rem;color:var(--mu)}
.glbl{font-size:.6rem;color:var(--mu);margin-bottom:2px}
.back{background:none;border:1px solid var(--br);color:var(--mu);padding:5px 12px;border-radius:999px;font-size:.74rem;cursor:pointer;margin-bottom:9px}
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.stk{border-radius:7px;padding:5px 3px;text-align:center;cursor:pointer;user-select:none;position:relative;font-size:.58rem;font-weight:800}
.stk.owned{background:rgba(34,197,94,.15);border:1.5px solid rgba(34,197,94,.3);color:var(--g)}
.stk.double{background:rgba(245,158,11,.15);border:1.5px solid rgba(245,158,11,.35);color:var(--y)}
.stk.needed{background:rgba(59,130,246,.15);border:1.5px solid rgba(59,130,246,.3);color:var(--b)}
.stk.missing{background:var(--s2);border:1.5px solid var(--br);color:var(--mu)}
.stk .nm{font-size:.52rem;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.dbadge{position:absolute;top:-4px;right:-4px;background:var(--y);color:#000;font-size:.44rem;font-weight:800;border-radius:999px;min-width:12px;height:12px;display:flex;align-items:center;justify-content:center;padding:0 2px}
.legend{display:flex;gap:7px;flex-wrap:wrap;font-size:.65rem;color:var(--mu);margin-bottom:8px}
.li{display:flex;align-items:center;gap:3px}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.exp-btn{width:100%;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;margin-bottom:8px}
.print-btn{width:100%;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;margin-bottom:10px}
.ov-sec{margin-bottom:14px}
.ov-sec h3{font-size:.9rem;font-weight:800;margin-bottom:5px}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{padding:2px 7px;border-radius:999px;font-size:.7rem;font-weight:700}
.pill.d{background:rgba(245,158,11,.12);color:var(--y);border:1px solid rgba(245,158,11,.22)}
.pill.n{background:rgba(59,130,246,.12);color:var(--b);border:1px solid rgba(59,130,246,.22)}
.empty{color:var(--mu);font-size:.76rem;font-style:italic}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column}
.modal{background:var(--s1);border-radius:16px 16px 0 0;max-height:90vh;display:flex;flex-direction:column;margin-top:auto}
.modal-head{padding:13px 15px 9px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h4{font-size:1rem;font-weight:800}
.modal-close{background:none;border:1px solid var(--br);color:var(--mu);border-radius:999px;padding:3px 11px;cursor:pointer;font-size:.78rem}
.modal-body{overflow-y:auto;padding:12px 14px 30px}
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.popup{background:var(--s1);border-radius:16px 16px 0 0;padding:18px 16px 32px;width:100%;max-width:500px}
.popup h4{font-size:1rem;font-weight:800;margin-bottom:3px}
.popup p{font-size:.75rem;color:var(--mu);margin-bottom:13px}
.popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.pop-add{padding:11px;border-radius:10px;border:2px solid rgba(34,197,94,.4);background:rgba(34,197,94,.08);color:var(--g);font-size:.82rem;font-weight:700;cursor:pointer}
.pop-rem{padding:11px;border-radius:10px;border:2px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:var(--r);font-size:.82rem;font-weight:700;cursor:pointer}
.pop-rem:disabled{opacity:.4;cursor:not-allowed}
.pop-cancel{width:100%;padding:9px;border-radius:10px;border:1px solid var(--br);background:transparent;color:var(--mu);font-size:.8rem;cursor:pointer}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--br);color:var(--tx);padding:7px 15px;border-radius:999px;font-size:.78rem;font-weight:700;z-index:999;white-space:nowrap;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(7px)}}
.reset-btn{display:block;margin:12px auto 0;background:none;border:1px solid var(--br);color:var(--mu);font-size:.68rem;padding:4px 12px;border-radius:999px;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <h1>Panini WM 2026</h1>
  <div class="sub">FIFA World Cup 2026</div>
  <div class="stats">
    <div class="sc g" onclick="showKpi('owned')"><div class="sv" id="st-owned">0</div><div class="sl">Habe ich</div></div>
    <div class="sc y" onclick="showKpi('doubles')"><div class="sv" id="st-doubles">0</div><div class="sl">Doppelt</div></div>
    <div class="sc r" onclick="showKpi('missing')"><div class="sv" id="st-missing">0</div><div class="sl">Fehlen</div></div>
    <div class="sc p" onclick="showKpi('needed')"><div class="sv" id="st-needed">0</div><div class="sl">Gesucht</div></div>
  </div>
  <div class="pb-w">
    <div class="pb-l"><span>Fortschritt</span><span id="pb-txt">0 / 0 (0%)</span></div>
    <div class="pb"><div class="pb-f" id="pb-fill" style="width:0%"></div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('manual',this)">Eingabe</button>
    <button class="tab" onclick="switchTab('album',this)">Album</button>
    <button class="tab" onclick="switchTab('overview',this)">Liste</button>
  </div>

  <!-- MANUAL -->

  <div id="tab-manual">
    <div class="panel">
      <h3>Codes eingeben</h3>
      <div class="m4">
        <button class="mb active-add" onclick="setMode('add',this)">+ Hinzufuegen</button>
        <button class="mb" onclick="setMode('remove',this)">- Entfernen</button>
        <button class="mb" onclick="setMode('need',this)">o Fehlend markieren</button>
        <button class="mb" onclick="setMode('unneed',this)">x Fehlend aufheben</button>
      </div>
      <textarea id="manual-input" placeholder="Codes eingeben, z.B.:&#10;GER1 GER5 ARG17 SUI9 BRA14&#10;FWC3 CCL1"></textarea>
      <button class="btn-go" onclick="applyManual()">Anwenden</button>
    </div>
  </div>

  <!-- ALBUM -->

  <div id="tab-album" class="hidden">
    <div id="album-list">
      <div class="frow">
        <button class="flt active" onclick="setAlbFilter('all',this)">Alle</button>
        <button class="flt" onclick="setAlbFilter('started',this)">Angefangen</button>
        <button class="flt" onclick="setAlbFilter('complete',this)">Komplett</button>
        <button class="flt" onclick="setAlbFilter('empty',this)">Leer</button>
      </div>
      <div class="sec-grid" id="sec-grid"></div>
    </div>
    <div id="album-detail" class="hidden">
      <button class="back" onclick="closeDetail()">Zurueck</button>
      <div id="detail-header"></div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:rgba(34,197,94,.3);border:1.5px solid #22c55e"></div>Vorhanden</div>
        <div class="li"><div class="ld" style="background:rgba(245,158,11,.3);border:1.5px solid #f59e0b"></div>Doppelt</div>
        <div class="li"><div class="ld" style="background:rgba(59,130,246,.3);border:1.5px solid #3b82f6"></div>Gesucht</div>
        <div class="li"><div class="ld" style="background:var(--s2);border:1.5px solid var(--br)"></div>Fehlt</div>
      </div>
      <div class="stk-grid" id="stk-grid"></div>
    </div>
  </div>

  <!-- OVERVIEW -->

  <div id="tab-overview" class="hidden">
    <button class="exp-btn" onclick="showExportModal()">Doppelte &amp; Fehlende anzeigen</button>
    <button class="print-btn" onclick="doPrint()">Drucken / PDF</button>
    <div class="ov-sec">
      <h3 style="color:var(--y)">Doppelte</h3>
      <div class="pills" id="ov-doubles"></div>
    </div>
    <div class="ov-sec">
      <h3 style="color:var(--b)">Fehlende</h3>
      <div class="pills" id="ov-missing"></div>
    </div>
  </div>
</div>

<!-- KPI MODAL -->

<div id="kpi-modal" class="modal-bg hidden" onclick="closeKpi()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h4 id="kpi-title"></h4>
      <button class="modal-close" onclick="closeKpi()">x</button>
    </div>
    <div class="modal-body" id="kpi-body"></div>
  </div>
</div>

<!-- EXPORT MODAL -->

<div id="exp-modal" class="modal-bg hidden" onclick="closeExpModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h4>Meine Sammlung</h4>
      <button class="modal-close" onclick="closeExpModal()">x</button>
    </div>
    <div class="modal-body" id="exp-body"></div>
  </div>
</div>

<!-- STICKER POPUP -->

<div id="stk-popup" class="popup-bg hidden" onclick="closePopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <h4 id="popup-title"></h4>
    <p id="popup-sub"></p>
    <div class="popup-btns">
      <button class="pop-add" id="popup-add" onclick="popupAction('add')">+ Hinzufuegen</button>
      <button class="pop-rem" id="popup-rem" onclick="popupAction('remove')">- Entfernen</button>
    </div>
    <button class="pop-cancel" onclick="closePopup()">Abbrechen</button>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">Reset alles</button>

<div id="toast" class="toast hidden"></div>

// Build checklist
var CHECKLIST = {};
var ALL_IDS = [];
var TOTAL = 0;
var ALL_SECTIONS = [];

SPECIAL_SECTIONS.forEach(function(sec) {
  ALL_SECTIONS.push({code:sec.code,name:sec.name,group:"Spezial",stickers:sec.stickers,isSpecial:true});
  sec.stickers.forEach(function(s) {
    CHECKLIST[s.id] = {id:s.id,name:s.name,section:sec.code,sectionName:sec.name,isSpecial:true};
    ALL_IDS.push(s.id);
  });
});
TEAMS.forEach(function(t) {
  var stickers = t.players.map(function(p,i){ return {id:t.code+(i+1),name:p,foil:i===0}; });
  ALL_SECTIONS.push({code:t.code,name:t.name,group:'Gruppe '+t.group,stickers:stickers,isSpecial:false});
  stickers.forEach(function(s) {
    CHECKLIST[s.id] = {id:s.id,name:s.name,section:t.code,sectionName:t.name,teamCode:t.code};
    ALL_IDS.push(s.id);
  });
});
TOTAL = ALL_IDS.length;

// State
var state = {owned:{},needed:{}};
var currentMode = 'add';
var albFilter = 'all';
var currentSection = null;
var currentPopupId = null;
var toastTimer = null;

// Load from localStorage
try {
  var saved = localStorage.getItem('panini26_v4');
  if(saved) state = JSON.parse(saved);
} catch(e){}

function save() {
  try { localStorage.setItem('panini26_v4', JSON.stringify(state)); } catch(e){}
}

// Parse IDs from text
var ALL_CODES = ALL_SECTIONS.map(function(s){return s.code;});
function parseIds(text) {
  var upper = text.toUpperCase();
  var found = [];
  var re = new RegExp('\\b('+ALL_CODES.join('|')+')'+'(\\d{1,2})\\b','g');
  var m;
  while((m=re.exec(upper))!==null){
    var id=m[1]+m[2];
    if(CHECKLIST[id]&&found.indexOf(id)<0) found.push(id);
  }
  if(upper.indexOf('00')>=0&&found.indexOf('00')<0) found.push('00');
  return found;
}

function applyIds(ids, mode) {
  if(!ids.length){showToast('Keine gueltigen Codes.');return;}
  ids.forEach(function(id){
    if(mode==='add') state.owned[id]=(state.owned[id]||0)+1;
    else if(mode==='remove'){if((state.owned[id]||0)>1)state.owned[id]--;else delete state.owned[id];}
    else if(mode==='need') state.needed[id]=true;
    else delete state.needed[id];
  });
  save(); render();
  var labels={add:'hinzugefuegt',remove:'entfernt',need:'als fehlend markiert',unneed:'aktualisiert'};
  showToast(ids.length+' Bild(er) '+labels[mode]+' ok');
}

function showToast(msg) {
  clearTimeout(toastTimer);
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.remove('hidden');
  toastTimer=setTimeout(function(){t.classList.add('hidden');},2400);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  var owned=Object.keys(state.owned).length;
  var doubles=ALL_IDS.filter(function(id){return state.owned[id]>1;}).length;
  var missing=TOTAL-owned;
  var needed=ALL_IDS.filter(function(id){return state.needed[id]&&!state.owned[id];}).length;
  var pct=Math.round((owned/TOTAL)*100);

  document.getElementById('st-owned').textContent=owned;
  document.getElementById('st-doubles').textContent=doubles;
  document.getElementById('st-missing').textContent=missing;
  document.getElementById('st-needed').textContent=needed;
  document.getElementById('pb-txt').textContent=owned+' / '+TOTAL+' ('+pct+'%)';
  document.getElementById('pb-fill').style.width=pct+'%';

  renderSecGrid();
  renderOverview();
  if(currentSection) renderDetail(currentSection);
}

function stkStatus(id){
  if(state.owned[id]>1) return 'double';
  if(state.owned[id]===1) return 'owned';
  if(state.needed[id]) return 'needed';
  return 'missing';
}

function secStats(sec){
  var tot=sec.stickers.length;
  var own=sec.stickers.filter(function(s){return state.owned[s.id];}).length;
  return {tot:tot,own:own,mis:tot-own};
}

function renderSecGrid() {
  var grid=document.getElementById('sec-grid');
  var filtered=ALL_SECTIONS.filter(function(sec){
    var st=secStats(sec);
    if(albFilter==='complete') return st.mis===0;
    if(albFilter==='started') return st.own>0&&st.mis>0;
    if(albFilter==='empty') return st.own===0;
    return true;
  });
  grid.innerHTML=filtered.map(function(sec){
    var st=secStats(sec);
    var pct=Math.round((st.own/st.tot)*100);
    var ok=st.mis===0?'color:var(--g)':'color:var(--mu)';
    var cls=sec.isSpecial?'sec-card special':'sec-card';
    return '<div class="'+cls+'" onclick="openDetail(\''+sec.code+'\')">'+
      '<div class="glbl">'+sec.group+'</div>'+
      '<h4>'+sec.name+'</h4>'+
      '<div class="mini-bar"><div class="mini-f" style="width:'+pct+'%"></div></div>'+
      '<div class="sec-meta"><span>'+st.own+'/'+st.tot+'</span>'+
      '<span style="'+ok+'">'+(st.mis===0?'Komplett':st.mis+' fehlen')+'</span></div></div>';
  }).join('');
}

function openDetail(code) {
  currentSection=code;
  document.getElementById('album-list').classList.add('hidden');
  document.getElementById('album-detail').classList.remove('hidden');
  renderDetail(code);
}

function closeDetail() {
  currentSection=null;
  document.getElementById('album-list').classList.remove('hidden');
  document.getElementById('album-detail').classList.add('hidden');
}

function renderDetail(code) {
  var sec=ALL_SECTIONS.find(function(s){return s.code===code;});
  if(!sec) return;
  var st=secStats(sec);
  document.getElementById('detail-header').innerHTML=
    '<div style="font-size:1rem;font-weight:800;margin-bottom:3px">'+sec.name+'</div>'+
    '<div style="font-size:.72rem;color:var(--mu);margin-bottom:8px">'+sec.group+' - '+st.own+'/'+st.tot+' gesammelt</div>';
  document.getElementById('stk-grid').innerHTML=sec.stickers.map(function(s){
    var status=stkStatus(s.id);
    var badge=state.owned[s.id]>1?'<span class="dbadge">x'+state.owned[s.id]+'</span>':'';
    return '<div class="stk '+status+'" onclick="openPopup(\''+s.id+'\')">'+
      badge+'<div>'+s.id+'</div><div class="nm">'+s.name+'</div></div>';
  }).join('');
}

function renderOverview() {
  var doubles=ALL_IDS.filter(function(id){return state.owned[id]>1;});
  var missing=ALL_IDS.filter(function(id){return !state.owned[id];});

  function groupBySec(ids){
    var map={};
    ids.forEach(function(id){
      var s=CHECKLIST[id].section,sn=CHECKLIST[id].sectionName;
      if(!map[s]) map[s]={name:sn,ids:[]};
      map[s].ids.push(id);
    });
    return Object.values(map);
  }

  var dEl=document.getElementById('ov-doubles');
  if(doubles.length===0){dEl.innerHTML='<span class="empty">Keine Doppelten.</span>';}
  else {
    dEl.innerHTML=groupBySec(doubles).map(function(sec){
      return '<div style="width:100%;margin-bottom:7px"><div style="font-size:.68rem;color:var(--mu);margin-bottom:3px">'+sec.name+'</div>'+
        sec.ids.map(function(id){return '<span class="pill d">'+id+' x'+state.owned[id]+'</span>';}).join('')+'</div>';
    }).join('');
  }

  var mEl=document.getElementById('ov-missing');
  if(missing.length===0){mEl.innerHTML='<span style="color:var(--g);font-weight:bold">Album komplett!</span>';}
  else {
    mEl.innerHTML=groupBySec(missing).map(function(sec){
      return '<div style="width:100%;margin-bottom:7px"><div style="font-size:.68rem;color:var(--mu);margin-bottom:3px">'+sec.name+'</div>'+
        sec.ids.map(function(id){return '<span class="pill n">'+id+'</span>';}).join('')+'</div>';
    }).join('');
  }
}

// ── TABS ─────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  ['manual','album','overview'].forEach(function(t){
    document.getElementById('tab-'+t).classList.add('hidden');
  });
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+name).classList.remove('hidden');
  btn.classList.add('active');
  if(name==='album'){ closeDetail(); renderSecGrid(); }
}

// ── MANUAL ───────────────────────────────────────────────────────────────
function setMode(mode, btn) {
  currentMode=mode;
  document.querySelectorAll('.mb').forEach(function(b){
    b.className='mb';
  });
  btn.className='mb active-'+mode;
}

function applyManual() {
  var text=document.getElementById('manual-input').value;
  var ids=parseIds(text);
  applyIds(ids, currentMode);
  document.getElementById('manual-input').value='';
}

// ── ALBUM FILTER ─────────────────────────────────────────────────────────
function setAlbFilter(f, btn) {
  albFilter=f;
  document.querySelectorAll('.flt').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderSecGrid();
}

// ── POPUP ────────────────────────────────────────────────────────────────
function openPopup(id) {
  currentPopupId=id;
  var info=CHECKLIST[id];
  var count=state.owned[id]||0;
  document.getElementById('popup-title').textContent=id+' - '+info.name;
  document.getElementById('popup-sub').textContent=count>0?'Aktuell: '+count+'x vorhanden':'Noch nicht vorhanden';
  document.getElementById('popup-add').textContent='+ Hinzufuegen ('+(count)+' -> '+(count+1)+')';
  document.getElementById('popup-rem').textContent='- Entfernen ('+(count)+' -> '+Math.max(0,count-1)+')';
  document.getElementById('popup-rem').disabled=count===0;
  document.getElementById('stk-popup').classList.remove('hidden');
}

function closePopup() { document.getElementById('stk-popup').classList.add('hidden'); }

function popupAction(action) {
  if(!currentPopupId) return;
  applyIds([currentPopupId], action);
  closePopup();
}

// ── KPI MODAL ────────────────────────────────────────────────────────────
function showKpi(type) {
  var cfgs = {
    owned:{title:'Habe ich',color:'var(--g)',ids:ALL_IDS.filter(function(id){return state.owned[id]>=1;})},
    doubles:{title:'Doppelte',color:'var(--y)',ids:ALL_IDS.filter(function(id){return state.owned[id]>1;})},
    missing:{title:'Fehlende',color:'var(--r)',ids:ALL_IDS.filter(function(id){return !state.owned[id];})},
    needed:{title:'Gesuchte',color:'var(--p)',ids:ALL_IDS.filter(function(id){return state.needed[id]&&!state.owned[id];})}
  };
  var cfg=cfgs[type];
  var map={};
  cfg.ids.forEach(function(id){
    var s=CHECKLIST[id].section,sn=CHECKLIST[id].sectionName;
    if(!map[s]) map[s]={name:sn,ids:[]};
    map[s].ids.push(id);
  });
  var clr = type==='doubles'?'rgba(245,158,11,.12)':type==='missing'?'rgba(239,68,68,.1)':type==='needed'?'rgba(168,85,247,.12)':'rgba(34,197,94,.12)';
  var tcl = type==='doubles'?'var(--y)':type==='missing'?'var(--r)':type==='needed'?'var(--p)':'var(--g)';
  document.getElementById('kpi-title').innerHTML='<span style="color:'+cfg.color+'">'+cfg.title+'</span> <span style="font-size:.75rem;color:var(--mu)">'+cfg.ids.length+' Sticker</span>';
  var body=Object.values(map).map(function(sec){
    return '<div style="margin-bottom:10px"><div style="font-size:.68rem;color:var(--mu);font-weight:700;text-transform:uppercase;margin-bottom:4px">'+sec.name+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:3px">'+
      sec.ids.map(function(id){
        return '<span style="padding:2px 8px;border-radius:999px;font-size:.72rem;font-weight:700;background:'+clr+';color:'+tcl+';border:1px solid '+tcl.replace(')',',0.25)')+'">'+id+(type==='doubles'?' x'+state.owned[id]:'')+'</span>';
      }).join('')+'</div></div>';
  }).join('');
  if(!body) body='<p style="color:var(--mu);font-style:italic">Keine Sticker.</p>';
  document.getElementById('kpi-body').innerHTML=body;
  document.getElementById('kpi-modal').classList.remove('hidden');
}
function closeKpi(){ document.getElementById('kpi-modal').classList.add('hidden'); }

  document.getElementById('exp-body').innerHTML=html;
  document.getElementById('exp-modal').classList.remove('hidden');
